syntax = "proto3";

option go_package = "egame-grpc/game/yhwy/pb";

package yhwy;

// yhwy_BetOrderResponse 是单次下注返回给前端的完整结果。
message yhwy_BetOrderResponse {
    optional string sn                = 1;   // 订单号
    optional double balance           = 2;   // 玩家当前余额
    optional double betAmount         = 3;   // 本局下注金额
    optional double curWin            = 4;   // 本局赢取金额
    optional double freeTotalWin      = 5;   // 免费游戏累计赢取
    optional double totalWin          = 6;   // 本回合总赢取
    optional bool isFree              = 7;   // 是否处于免费模式
    optional int64 review             = 8;   // 复盘标志 1=复盘 0=正常
    optional yhwy_WinInfo winInfo     = 9;   // 中奖详情
    repeated int64 cards              = 10;  // 符号网格
    optional int64 scatterCount       = 11;  // Scatter
    optional bool isRoundOver         = 12;  // 是否本局结束
    optional int64 state              = 13;  // 游戏状态 0=普通 1=免费
    optional int64 remainingFreeTimes = 14;  // 剩余免费次数
    optional int64 totalFreeTimes     = 15;  // 已使用免费次数
    repeated int64 winGrid            = 16;  // 中奖位置网格
    optional bool isGameOver          = 17;  // 大回合结束
    optional int64 lineMultiplier     = 18;  // 本次所有中奖线赔率之和
    repeated int64 mysGrid            = 19;  // 百变樱花盘面
    //    repeated int64 effectCards    = 18;  // 复位/扩散后、揭示前盘面
    //    repeated int64 finalCards     = 19;  // 揭示完成后的最终判奖盘面
    //    optional int64 revealSymbol   = 20;  // 百变樱花本次揭示出的目标符号
    //    optional bool isSakuraStorm   = 21;  // 是否触发樱吹雪
    //    optional int64 sakuraReels    = 22;  // 樱吹雪替换到的最远列（3/4/5）
    //    optional int64 collectCount   = 23;  // 当前樱花累计收集数
    //    optional int64 collectLevel   = 24;  // 当前樱花堆外观等级（0~3）
    //    optional int64 lineMultiplier = 25;  // 所有中奖线赔率之和
}

// yhwy_WinInfo 汇总本次 step 的中奖线与免费次数变化。
message yhwy_WinInfo {
    repeated yhwy_WinArr winArr = 1;  // 本次命中的所有中奖线
    optional int64 addFreeNum   = 2;  // 本次新增的免费次数
}

// yhwy_WinArr 描述单条中奖线。
message yhwy_WinArr {
    optional int64 roadNum = 1;  // 中奖线编号，从 0 开始
    optional int64 odds    = 2;  // 该中奖线赔率
    //    optional int64 symbol  = 3;  // 该中奖线命中的主符号
    //    optional int64 count   = 4;  // 连续命中的数量
}
