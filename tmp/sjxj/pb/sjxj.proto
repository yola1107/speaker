syntax = "proto3";

option go_package = "egame-grpc/game/common/pb";

package sjxj;

// 世界小姐 (GameID: 18969)
// 盘面: 8x5（Base/Free 同结构，Base仅显示下4行，Free显示8行）
// 特色: 解锁行数、连续免费游戏

message sjxj_BetOrderResponse {
    optional string sn                = 1;   // 订单号
    optional double balance           = 2;   // 玩家当前余额
    optional double betAmount         = 3;   // 本局下注金额 (baseMoney * multiple * 50)
    optional double curWin            = 4;   // 本局赢取金额
    optional double freeTotalWin      = 5;   // 免费游戏累计赢取 (ClientOfFreeGame.GetFreeTotalMoney)
    optional double totalWin          = 6;   // 本回合总赢取 (ClientOfFreeGame.GetGeneralWinTotal)
    optional bool isFree              = 7;   // 是否处于免费模式
    optional int64 review             = 8;   // 复盘标志 1=复盘 0=正常
    sjxj_WinInfo winInfo              = 9;   // 中奖详情（线奖列表、加次等）
    repeated int64 cards              = 10;  // 符号网格 8×5，按行优先 elements共40个（服务端方向，不翻转）
    optional int64 scatterCount       = 11;  // Scatter 个数（Base=底4行；Free=已解锁行）
    optional bool isRoundOver         = 12;  // 是否本局结束
    optional int64 state              = 13;  // 游戏状态 0=普通 1=免费
    optional int64 remainingFreeTimes = 14;  // 剩余免费次数 ClientOfFreeGame.GetFreeNum
    optional int64 totalFreeTimes     = 15;  // 已使用免费次数 ClientOfFreeGame.GetFreeTimes
    repeated int64 winGrid            = 16;  // 中奖位置网格 8×5（仅标记底4行，1=中奖位 0=未中奖）
    optional bool isGameOver          = 17;  // 大回合结束
    optional double roundWin          = 18;  // 一局所有回合总赢
    optional int32 unlockedRows       = 19;  // Free 专用：已解锁行数（自下而上，范围 4~8；Base 固定为 4）
    optional int32 prevUnlockedRows   = 20;  // Free 专用：上一局的解锁行数（用于计算本轮新解锁行数）
    optional double baseBet           = 21;  // 基础下注
    optional int64 multiplier         = 22;  // 下注倍数
    optional int64 newFreeTimes       = 23;  // 新增免费次数
    repeated int64 freeUnlockTh       = 24;  // 免费剩余解锁行数量
}

// sgz_WinInfo 中奖详情
message sjxj_WinInfo {
    repeated sjxj_WinArr winArr     = 1;  // 本步各条中奖线的详情
    optional int64 freeGameMultiple = 2;  // 免费模式消除倍数列表（5个）
}

// sgz_WinArr 单条中奖线详情
message sjxj_WinArr {
    optional int64 roadNum = 1;  // 支付线编号 0~19
    optional int64 odds    = 2;  // 基础赔率 来自 pay_table
}
