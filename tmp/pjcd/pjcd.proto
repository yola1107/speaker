syntax = "proto3";

option go_package = "egame-grpc/game/common/pb";

import "common.proto";

package pjcd;

// 破茧成蝶 - 3行5列，20条赔付线，消除下落，黏性多形态百搭
message Pjcd_BetOrderResponse {
    string orderSN     = 1;   // 订单号
    double balance     = 2;   // 玩家当前余额
    double betAmount   = 3;   // 本局下注金额 (baseMoney * multiple * 20)
    double currentWin  = 4;   // 本步赢取金额 (当前消除获得的奖金)
    double freeWin     = 5;   // 免费游戏累计赢取 (ClientOfFreeGame.GetFreeTotalMoney)
    double totalWin    = 6;   // 本回合总赢取 (ClientOfFreeGame.GetGeneralWinTotal)
    bool free          = 7;   // 是否处于免费模式
    int64 review       = 8;   // 复盘标志 1=复盘 0=正常
    Pjcd_WinInfo winInfo = 9;   // 中奖详情（消除结果、倍数、免费剩余等）
    common.Board cards  = 10;  // 符号网格 3行×5列 按行优先 elements共15个
    int64 scatterCount = 11;  // 夺宝符(9)个数
}

// Pjcd_WinInfo 中奖详情（消除回合内信息）
message Pjcd_WinInfo {
    bool isRoundOver            = 1;   // 是否本局结束（无中奖）
    int64 multi                 = 2;   // 本步倍数 stepMultiplier = lineMultiplier * roundMultiplier
    int64 state                 = 3;   // 游戏状态 0=普通 1=免费
    int64 freeNum               = 4;   // 剩余免费次数 ClientOfFreeGame.GetFreeNum
    int64 freeTime              = 5;   // 已使用免费次数 ClientOfFreeGame.GetFreeTimes
    repeated Pjcd_WinArr winArr = 6;   // 本步各条中奖线的详情
    common.Board winGrid        = 7;   // 中奖位置网格 3行×5列 1标记中奖位 0未中奖
    bool isGameOver             = 8;   // 大回合结束（免费模式结束）
    int64 addFreeNum            = 9;   // 增加的免费次数（触发或再触发）

    // 轮次倍数相关
    int64 roundIndex            = 10;  // 当前消除轮次索引 (0,1,2,3)
    repeated int64 roundMultipliers = 11;  // 轮次倍数列表 [1,2,3,5] 或 [3,6,9,15]

    // 百搭形态相关
    int64 butterflyBonus        = 12;  // 蝴蝶百搭累加倍数（免费模式跨spin）
    common.Board wildStateGrid  = 13;  // 百搭状态网格 3行×5列 0=无 1=毛虫 2=蝶茧 3=蝴蝶
    int64 wildAddBonus          = 14;  // 本步蝴蝶百搭增加的倍数
}

// Pjcd_WinArr 单条中奖线详情
message Pjcd_WinArr {
    int64 val     = 1;  // 中奖符号值 1~7为普通符号 8百搭 9夺宝
    int64 roadNum = 2;  // 支付线编号 0~19
    int64 starNum = 3;  // 连续相同符号个数 3/4/5
    int64 odds    = 4;  // 基础赔率 来自 pay_table
    int64 mul     = 5;  // 倍数 本线贡献的倍数（含轮次倍数）
    common.Board grid = 6;  // 该线中奖位置 3×5 1标记中奖格
}