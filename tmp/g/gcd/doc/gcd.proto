syntax = "proto3";

option go_package = "egame-grpc/game/gcd/pb";

package gcd;

// 中奖详情响应
message gcd_BetOrderResponse {
  optional string orderSn           = 1; // 订单号
  optional double balance           = 2; // 余额
  optional double baseBet           = 3; // 基础下注
  optional double betAmount         = 4; // 下注金额
  optional int64 multiplier         = 5; // 下注倍数
  optional double curWin            = 6; // 本轮赢取
  optional double roundWin          = 7; // 本轮总赢取
  optional double totalWin          = 8; // 总赢取
  optional double freeTotalWin      = 9; // 免费局累计赢取
  optional bool isRoundOver         = 10; // 下回合扣钱或者下回合减免费次数
  optional bool isSpinOver          = 11; // 下回合扣钱
  optional bool isFree              = 13; // 是否处于免费局
  optional int64 newFreeTimes       = 14; // 新增免费次数
  optional int64 remainingFreeTimes = 15; // 免费次数
  optional int64 totalFreeTimes     = 17; // 已使用免费次数
  Board cards                       = 20; // 盘面
  Board winCards                    = 21; // 盘面
  
  gcd_GameInfo gameInfo             = 30; // 游戏详情
  optional int64 freeType           = 31; // 免费类型/免费玩法类型
  optional int64 bonusState         = 32; // 免费选档状态: 0无, 1待选, 2已选
}

message gcd_GameInfo {
  optional int64 roundStep  = 1; // 第几个回合
  repeated WinResult winArr = 2; // 线奖中奖结果列表
}

message Board {
  repeated int64 elements = 1;
}

message WinResult {
  optional int64 symbol    = 1;// 符号
  optional int64 symbolNum = 2;// 数量
  optional int64 multiplier= 3;// 倍率
  optional int64 lineNo    = 4;// 线序
  Board grid               = 5;// 牌面
}
