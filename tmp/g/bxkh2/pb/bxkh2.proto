syntax = "proto3";

option go_package = "egame-grpc/game/bxkh2/pb";

package bxkh2;

// 巴西狂欢 (GameID: 18965)
// 盘面: 6x6
// 特色: 免费模式、连消进阶倍率、长符号转化
message bxkh2_BetOrderResponse {
    optional string sn           = 1;   // 订单号
    optional double balance      = 2;   // 当前余额
    optional double baseBet      = 3;   // 基础下注
    optional int64 multiplier    = 4;   // 下注倍数
    optional double betAmount    = 5;   // 实际投注金额（baseBet × multiplier × baseMultiple）
    optional double curWin       = 6;   // step：本次 betOrder 赢分
    optional double roundWin     = 7;   // round：本回合累计赢（连消多步累计）
    optional double totalWin     = 8;   // spin：本 spin 总赢（含免费触发轮）
    optional double freeWin      = 9;   // 免费局阶段累计总赢（不含触发轮）
    optional bool isRoundOver    = 10;  // 本 round 是否结束
    optional bool isFree         = 11;  // 当前是否处于免费游戏
    optional int64 freeNum       = 12;  // 剩余免费次数
    optional int64 freeTime      = 13;  // 已使用免费次数
    optional int64 newFreeTimes  = 14;  // 本步新增的免费旋转次数
    repeated int64 symGrid       = 15;  // 本步牌面（6x6，按行展开）
    repeated int64 winGrid       = 16;  // 中奖位置网格（与 symGrid 同序）
    repeated bxkh2_WinArr winArr = 17;  // 本次命中的所有中奖线明细
    optional int64 freeMultiple  = 18;  // 免费局连消倍率（1,2,3...）
    repeated int64 originalCards = 19;  // 转化/下落前原始牌面（展示用途）
}

message bxkh2_WinArr {
    optional int64 val     = 1;  // 中奖符号
    optional int64 roadNum = 2;  // 中奖路数（线数积）
    optional int64 starNum = 3;  // 连续命中列数
    optional int64 odds    = 4;  // 赔率
    optional int64 mul     = 5;  // 倍率（roadNum × odds）
}
