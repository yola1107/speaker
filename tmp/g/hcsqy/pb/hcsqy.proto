syntax = "proto3";

option go_package = "egame-grpc/game/common/pb";

package hcsqy;

// 横财三千亿 (GameID: 18956)
// 盘面: 3x3，5条中奖线
// 特色: 重转至赢、百搭变大、长条百搭

message hcsqy_BetOrderResponse {
    optional string sn             = 1;   // 订单号
    optional double balance        = 2;   // 玩家当前余额
    optional double baseBet        = 3;   // 基础下注
    optional int64 multiplier      = 4;   // 下注倍数
    optional double betAmount      = 5;   // 本局下注金额 (baseMoney * multiple * 5)
    optional double curWin         = 6;   // 本局赢取金额
    optional double freeWin        = 7;   // 免费游戏累计赢取
    optional double totalWin       = 8;   // 本回合总赢取
    optional bool isRoundOver      = 9;   // 是否本局结束
    optional bool isFree           = 10;  // 是否处于免费模式
    optional int64 freeNum         = 11;  // 剩余免费次数
    optional int64 freeTime        = 12;  // 已使用免费次数
    optional int64 newFreeTimes    = 13;  // 本步新增的免费旋转次数
    optional bool isPurchase       = 14;  // 当前大回合是否购买免费触发
    repeated int64 symGrid         = 15;  // 盘面
    repeated int64 winGrid         = 16;  // 中奖位置网格
    optional bool next             = 17;  // 是否需要继续请求（重转至赢）
    optional bool isRespinUntilWin = 18;  // 是否在重转至赢模式中 (有炸胡动画)
    optional int32 respinWildCol   = 19;  // 重转至赢模式长条百搭列 (0-2)，非重转模式为-1
    optional int64 wildMultiplier  = 20;  // 长条百搭倍数 (x2-x20)
    optional int64 lineMultiplier  = 21;  // 线赔率合计（各中奖线基础赔率之和，未乘长条百搭）
    optional int64 scatterCount    = 22;  // 夺宝符个数
    repeated hcsqy_WinArr winArr   = 23;  // 本步各条中奖线的详情
}

// hcsqy_WinArr 单条中奖线详情
message hcsqy_WinArr {
    optional int64 roadNum = 1;  // 支付线编号 0~4
    optional int64 odds    = 2;  // 基础赔率 来自 pay_table
}
