syntax = "proto3";

option go_package = "egame-grpc/game/common/pb";

package ajtm;

// 埃及探秘 (GameID: 18985)
// 盘面: 5x6
// 玩法: Ways 消除 + 长符号转变
message ajtm_BetOrderResponse {
    string orderSN                     = 1;   // 订单号
    double balance                     = 2;   // 当前余额
    double betAmount                   = 3;   // 本局下注金额
    double currentWin                  = 4;   // 本步赢分
    double freeWin                     = 5;   // 免费模式累计赢分
    double totalWin                    = 6;   // 当前大回合累计赢分
    bool free                          = 7;   // 是否免费模式
    int64 review                       = 8;   // 复盘标记
    ajtm_WinInfo winInfo               = 9;   // 中奖详情
    repeated int64 cards               = 10;  // 当前盘面
    int64 scatterCount                 = 11;  // 当前盘面夺宝数量
    bool isRoundOver                   = 12;  // 当前 round 是否结束
    int64 multi                        = 13;  // 本步最终倍数
    int64 state                        = 14;  // 当前阶段
    int64 freeNum                      = 15;  // 剩余免费次数
    int64 freeTime                     = 16;  // 已执行免费次数
    repeated int64 winGrid             = 17;  // 中奖展示网格
    bool isGameOver                    = 18;  // 免费总流程是否结束
    double roundWin                    = 19;  // 当前 round 累计赢分
    int64 mulIndex                     = 20;  // 倍数档位索引（预留）
    repeated int64 baseMultipliers     = 21;  // 基础倍数表（预留）
    repeated int64 freeMultipliers     = 22;  // 免费倍数表（预留）
    int64 wildEliCount                 = 23;  // wild 消除数（预留）
    int64 totalWildEliCount            = 24;  // wild 累计消除数（预留）
    repeated ajtm_LongEvent longEvents = 25;  // 长符号转变事件
}

message ajtm_WinInfo {
    repeated ajtm_WinArr winArr = 1;  // 本步中奖条目
    int64 addFreeNum            = 2;  // 本步新增免费次数
    int64 wildEliMultiple       = 3;  // wild 额外倍数（预留）
}

message ajtm_WinArr {
    int64 roadNum = 1;  // 路数
    int64 odds    = 2;  // 赔率
}

message ajtm_LongEvent {
    int64 col       = 1;  // 列号
    int64 headRow   = 2;  // 头部行号
    int64 tailRow   = 3;  // 尾部行号
    int64 oldSymbol = 4;  // 转变前符号
    int64 newSymbol = 5;  // 转变后符号
}
