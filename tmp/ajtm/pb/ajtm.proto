syntax = "proto3";

option go_package = "egame-grpc/game/common/pb";

package ajtm;

// 埃及探秘 (GameID: 18985)
// 盘面: 5x6
// 玩法: Ways 消除 + 长符号转变
message ajtm_BetOrderResponse {
    optional string sn                = 1;   // 订单号
    optional double balance           = 2;   // 当前余额
    optional double betAmount         = 3;   // 本局下注金额
    optional double curWin            = 4;   // 本步赢分
    optional double freeTotalWin      = 5;   // 免费模式累计赢分
    optional double totalWin          = 6;   // 当前大回合累计赢分
    optional bool isFree              = 7;   // 是否免费模式
    optional int64 review             = 8;   // 复盘标记
    ajtm_WinInfo winInfo              = 9;   // 中奖详情
    repeated int64 cards              = 10;  // 当前盘面
    optional int64 scatterCount       = 11;  // 当前盘面夺宝数量
    optional bool isRoundOver         = 12;  // 当前 round 是否结束
    optional int64 state              = 13;  // 当前阶段
    optional int64 remainingFreeTimes = 14;  // 剩余免费次数
    optional int64 totalFreeTimes     = 15;  // 已执行免费次数
    optional int64 stepMul            = 16;  // 本步最终倍数
    repeated int64 winGrid            = 17;  // 中奖展示网格
    optional bool isGameOver          = 18;  // 免费总流程是否结束
    optional double roundWin          = 19;  // 当前 round 累计赢分
    optional int64 mysMul             = 20;  // 当前神秘符号倍数
    repeated ajtm_WinMys winMys       = 21;  // 长符号转变事件
}

message ajtm_WinInfo {
    repeated ajtm_WinArr winArr = 1;  // 本步中奖条目
    optional int64 addFreeNum   = 2;  // 本步新增免费次数
}

message ajtm_WinArr {
    optional int64 roadNum = 1;  // 路数
    optional int64 odds    = 2;  // 赔率
}

message ajtm_WinMys {
    optional int64 col       = 1;  // 列号
    optional int64 headRow   = 2;  // 头部行号
    optional int64 tailRow   = 3;  // 尾部行号
    optional int64 oldSymbol = 4;  // 转变前符号
    optional int64 newSymbol = 5;  // 转变后符号
}
